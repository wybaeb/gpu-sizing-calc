<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="color-scheme" content="light dark">
<title>Калькулятор ресурсов</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0f172a;--mut:#5b6b82;--line:#e2e8f0;--bg:#f2f5f9;--card:#fff;--acc:#1d4e89;--bad:#c0392b}
@media (prefers-color-scheme:dark){:root{--ink:#e8eef6;--mut:#93a3b8;--line:#2b3648;--bg:#0d1420;--card:#151d2b;--acc:#6ea8e0;--bad:#e8705f}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink)}
.lock{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
.lock-box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px 20px;width:100%;max-width:340px;text-align:center;box-shadow:0 8px 30px rgba(15,23,42,.14)}
.brand{font-weight:800;letter-spacing:.16em;color:var(--acc);font-size:12px;margin-bottom:14px}
.lock-box h2{font-size:16px;margin-bottom:6px}
.lock-box p{font-size:12.5px;color:var(--mut);margin-bottom:16px;line-height:1.4}
.lock-box input{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:9px;background:var(--bg);color:var(--ink);font-size:16px;text-align:center;font-family:inherit;margin-bottom:10px}
.lock-box button{width:100%;padding:13px;border:none;border-radius:9px;background:var(--acc);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.lock-box button:disabled{opacity:.6}
.err{color:var(--bad);font-size:12.5px;margin-top:10px;min-height:16px}
</style></head>
<body>
<div id="gate" class="lock"><div class="lock-box">
  <div class="brand">ЭВАЛ</div>
  <h2>Доступ по паролю</h2>
  <p>Страница зашифрована. Введите пароль — он сохранится на этом устройстве.</p>
  <input id="pw" type="password" inputmode="text" autocomplete="current-password" placeholder="пароль" autofocus>
  <button id="go">Открыть</button>
  <div class="err" id="err"></div>
</div></div>
<div id="app"></div>

const CK = "calc_pw";

const setCk = (v) => { document.cookie = CK+"="+encodeURIComponent(v)+";path=/;max-age="+(60*60*24*60)+";samesite=strict"; };
const getCk = () => (document.cookie.match("(^|;)\\s*"+CK+"\\s*=\\s*([^;]+)")||[])[2];
const delCk = () => { document.cookie = CK+"=;path=/;max-age=0"; };
const b64 = (s) => Uint8Array.from(atob(s), c=>c.charCodeAt(0));

async function decrypt(pw){
  const enc = new TextEncoder();
  const base = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b64(BLOB.salt), iterations:BLOB.iter, hash:"SHA-256"},
    base, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64(BLOB.iv)}, key, b64(BLOB.ct));
  return new TextDecoder().decode(pt);
}

function mount(html){
  document.getElementById("gate").style.display = "none";
  const app = document.getElementById("app");
  app.innerHTML = html;
  // innerHTML не исполняет <script> — переносим вручную
  app.querySelectorAll("script").forEach(old=>{
    const s = document.createElement("script");
    s.textContent = old.textContent;
    document.body.appendChild(s);
    old.remove();
  });
}

async function tryPw(pw, remember){
  const html = await decrypt(pw);   // бросит исключение при неверном пароле (GCM-тег)
  if (remember) setCk(pw);
  mount(html);
}

document.getElementById("go").addEventListener("click", async ()=>{
  const btn = document.getElementById("go"), err = document.getElementById("err");
  const pw = document.getElementById("pw").value.trim();
  if (!pw) return;
  btn.disabled = true; err.textContent = "Проверка…";
  try { await tryPw(pw, true); }
  catch(e){ err.textContent = "Неверный пароль"; btn.disabled = false; document.getElementById("pw").select(); }
});
document.getElementById("pw").addEventListener("keydown", e=>{ if(e.key==="Enter") document.getElementById("go").click(); });

(async ()=>{                      // автооткрытие по куке
  const saved = getCk();
  if (!saved) return;
  try { await tryPw(decodeURIComponent(saved), false); }
  catch(e){ delCk(); }
})();
</script>
